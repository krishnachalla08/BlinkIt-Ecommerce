server:
  port: 9000

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:9001
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: http://product-service:9002
          predicates:
            - Path=/products/**,/categories/**
        - id: cart-service
          uri: http://cart-service:9004
          predicates:
            - Path=/cart/**
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

server:
  port: 9000

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9001
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: http://localhost:9002
          predicates:
            - Path=/products/**,/categories/**
        - id: order-service
          uri: http://localhost:9003
          predicates:
            - Path=/orders/**
        - id: cart-service
          uri: http://localhost:9004
          predicates:
            - Path=/cart/**
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

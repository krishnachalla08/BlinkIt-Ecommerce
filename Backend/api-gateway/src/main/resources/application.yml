server:
  port: 9000

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/products/**,/categories/**
        - id: cart-service
          uri: http://cart-service:8083
          predicates:
            - Path=/cart/**
        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/orders/**
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

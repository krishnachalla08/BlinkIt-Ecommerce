
<div class="product-card">
  <!-- Product Image -->
  <div class="product-image">
    <img
      [src]="product.imageUrl || '/assets/images/placeholder.png'"
      [alt]="product.name"
      loading="lazy"
      [class.out-of-stock-img]="isOutOfStock"
    />
    <div *ngIf="isOutOfStock" class="out-of-stock-badge">Out of Stock</div>
    <div class="product-overlay">
      <button class="quick-view-btn" (click)="onQuickView()">
        👁️ Quick View
      </button>
    </div>
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <div class="product-header">
      <h3 class="product-title">{{ product.productName }}</h3>
      <div class="product-rating">
        <span class="stars">⭐⭐⭐⭐⭐</span>
        <span class="rating-text">(4.5)</span>
      </div>
    </div>

    <p class="product-description">{{ product.description }}</p>

    <div class="product-footer">
      <div class="price-section">
        <span class="current-price">₹{{ product.price }}</span>
        <!-- <span class="original-price" *ngIf="product.originalPrice">₹{{ product.originalPrice }}</span> -->
        <!-- <span class="discount" *ngIf="product.discount">{{ product.discount }}% off</span> -->
      </div>

      <div class="action-buttons">
        <button class="add-to-cart-btn" (click)="onAddToCart()" [disabled]="isOutOfStock" [class.disabled-btn]="isOutOfStock">
          <span class="cart-icon" *ngIf="!isOutOfStock">🛒</span>
          {{ isOutOfStock ? 'Out of Stock' : 'Add' }}
        </button>
        <button class="wishlist-btn" (click)="onToggleWishlist()">
          <span class="heart-icon">❤️</span>
        </button>
      </div>
    </div>
  </div>
</div>

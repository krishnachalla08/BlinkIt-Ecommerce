<!-- Hero Section -->
<section class="hero">
  <div class="container">
    <div class="hero-content">
      <h1 class="hero-title">Fresh & Fast Delivery</h1>
      <p class="hero-subtitle">Discover amazing products delivered to your doorstep in minutes</p>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-number">10K+</span>
          <span class="stat-label">Products</span>
        </div>
        <div class="stat">
          <span class="stat-number">50+</span>
          <span class="stat-label">Categories</span>
        </div>
        <div class="stat">
          <span class="stat-number">24/7</span>
          <span class="stat-label">Service</span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Products Section -->
<section class="products-section">
  <div class="container">
    <!-- Loading State -->
    <div *ngIf="loading" class="loading-state">
      <div class="loader"></div>
      <p class="loading-text">Discovering amazing products...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error" class="error-state">
      <div class="error-icon">⚠️</div>
      <h3 class="error-title">Oops! Something went wrong</h3>
      <p class="error-message">{{ error }}</p>
      <button class="btn btn-primary" (click)="loadData()">
        Try Again
      </button>
    </div>

    <!-- Products Content -->
    <div *ngIf="!loading && !error" class="products-content fade-in">
      <!-- Category Navigation -->
      <div class="category-nav">
        <div class="nav-container">
          <button
            *ngFor="let category of getNavigationCategories()"
            class="category-btn"
            [class.active]="selectedCategory === category"
            (click)="selectCategory(category)">
            <span class="category-icon">{{ getCategoryIcon(category) }}</span>
            <span class="category-name">{{ category }}</span>
            <span class="category-count" *ngIf="getCategoryCount(category) > 0">
              {{ getCategoryCount(category) }}
            </span>
          </button>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="products-grid" *ngIf="getVisibleProducts().length > 0">
        <div
          class="product-card-wrapper"
          *ngFor="let product of getVisibleProducts(); trackBy: trackByProductId">
          <app-product-card [product]="product"></app-product-card>
        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="getVisibleProducts().length === 0" class="empty-state">
        <div class="empty-icon">🛒</div>
        <h3 class="empty-title">No products found</h3>
        <p class="empty-message">Try selecting a different category or check back later.</p>
      </div>
    </div>
  </div>
</section>

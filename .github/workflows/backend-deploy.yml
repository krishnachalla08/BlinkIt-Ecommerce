name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**' # Triggers only when backend code changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push API Gateway
      uses: docker/build-push-action@v4
      with:
        context: ./Backend
        push: true
        build-args: SERVICE_NAME=api-gateway
        tags: ${{ secrets.DOCKER_USERNAME }}/blinkit-api-gateway:latest

    - name: Build and Push Auth Service
      uses: docker/build-push-action@v4
      with:
        context: ./Backend
        push: true
        build-args: SERVICE_NAME=auth-service
        tags: ${{ secrets.DOCKER_USERNAME }}/blinkit-auth-service:latest

    - name: Build and Push Product Service
      uses: docker/build-push-action@v4
      with:
        context: ./Backend
        push: true
        build-args: SERVICE_NAME=product-service
        tags: ${{ secrets.DOCKER_USERNAME }}/blinkit-product-service:latest

    - name: Copy docker-compose to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "Backend/docker-compose.yml"
        target: "/home/${{ secrets.EC2_USER }}/"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install docker-compose if not present
          if ! command -v docker-compose &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install docker-compose -y
          fi
          
          # Create Swap Space (Critical for EC2 Free Tier 1GB RAM)
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 2G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi
          
          mkdir -p /home/${{ secrets.EC2_USER }}/Backend
          cd /home/${{ secrets.EC2_USER }}/Backend
          
          # Generate .env file dynamically
          cat <<EOF > .env
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REGION=${{ secrets.AWS_REGION }}
          CDN_URL=${{ secrets.AWS_CDN_URL }}
          ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
          SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF
          
          # Stop and remove legacy container if it exists
          docker stop blinkit-backend || true
          docker rm blinkit-backend || true
          
          # Start all microservices using docker-compose
          docker-compose pull
          docker-compose up -d
          
          docker image prune -f

name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main # Triggers on push to the main branch
    paths:
      - 'Frontend/**' # Only trigger if frontend code changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./Frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/blinkit-frontend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }} # e.g., ubuntu or ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/blinkit-frontend:latest
          docker stop blinkit-frontend || true
          docker rm blinkit-frontend || true
          docker run -d --name blinkit-frontend --restart unless-stopped -p 80:80 ${{ secrets.DOCKER_USERNAME }}/blinkit-frontend:latest
          
          # Clean up dangling images to save EC2 disk space over time
          docker image prune -f
